version: 2

models:
  - name: int_shifts_with_duration
    description: "Completed shifts enriched with computed hours_worked and gross_pay from the parent job's hourly_rate."
    columns:
      - name: shift_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: job_id
        tests:
          - not_null
      - name: job_name
        tests:
          - not_null
      - name: hourly_rate
        tests:
          - not_null
      - name: shift_date
        tests:
          - not_null
      - name: hours_worked
        description: "Decimal hours between clock_in and clock_out."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: gross_pay
        description: "hours_worked * hourly_rate, rounded to 2 decimal places."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
