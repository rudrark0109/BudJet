version: 2

models:
  - name: stg_transactions
    description: "Cleaned, typed transactions from Bronze. Invalid rows (null amount, unknown type) are dropped."
    columns:
      - name: transaction_id
        description: "Postgres serial PK"
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: transaction_type
        tests:
          - not_null
          - accepted_values:
              values: ['income', 'expense']
      - name: transaction_date
        tests:
          - not_null
      - name: category_id
        tests:
          - not_null

  - name: stg_categories
    description: "Cleaned categories with a fallback grey color for any NULL color."
    columns:
      - name: category_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: category_name
        tests:
          - not_null
      - name: category_type
        tests:
          - not_null
          - accepted_values:
              values: ['income', 'expense']
      - name: color
        tests:
          - not_null

  - name: stg_budgets
    description: "Monthly budget limits. month_key is the raw 'YYYY-MM' string; budget_month is a DATE for joins."
    columns:
      - name: budget_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: category_id
        tests:
          - not_null
      - name: budget_amount
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: budget_month
        tests:
          - not_null

  - name: stg_jobs
    description: "Hourly job profiles per user."
    columns:
      - name: job_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: job_name
        tests:
          - not_null
      - name: hourly_rate
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: stg_shifts
    description: "Completed shifts only (clock_out NOT NULL)."
    columns:
      - name: shift_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: job_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_jobs')
              field: job_id
      - name: shift_date
        tests:
          - not_null
      - name: clock_in
        tests:
          - not_null
      - name: clock_out
        tests:
          - not_null
